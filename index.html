<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Body Tracker Stable</title>

<style>

body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

video{
  position:absolute;
  left:0;
  top:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  transform:scaleX(-1);
}

canvas{
  position:absolute;
  left:0;
  top:0;
  width:100vw;
  height:100vh;
  pointer-events:none;
}

#info{
  position:absolute;
  left:10px;
  top:10px;

  color:white;
  background:rgba(0,0,0,0.5);

  padding:10px;
  border-radius:10px;

  font-size:14px;

  width:320px;
  max-height:95vh;

  overflow-y:auto;
}

</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="info"></div>

<script type="module">

import {
  PoseLandmarker,
  FilesetResolver
}
from
"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const info =
document.getElementById("info");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

const vision =
await FilesetResolver.forVisionTasks(
"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
);

const poseLandmarker =
await PoseLandmarker.createFromOptions(
vision,
{
  baseOptions:{
    modelAssetPath:
    "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/1/pose_landmarker_full.task"
  },

  runningMode:"VIDEO",

  numPoses:1
}
);

navigator.mediaDevices.getUserMedia({
  video:true
})
.then(stream=>{
  video.srcObject = stream;
});

const LANDMARKS = {

  face:0,

  leftShoulder:11,
  rightShoulder:12,

  leftElbow:13,
  rightElbow:14,

  leftHand:15,
  rightHand:16,

  leftHip:23,
  rightHip:24,

  leftKnee:25,
  rightKnee:26,

  leftAnkle:27,
  rightAnkle:28,

  leftFoot:31,
  rightFoot:32
};

function drawPoint(
  x,
  y,
  color,
  label
){

  ctx.beginPath();

  ctx.arc(
    x,
    y,
    8,
    0,
    Math.PI*2
  );

  ctx.fillStyle = color;
  ctx.fill();

  ctx.fillStyle = "white";

  ctx.font =
  "16px sans-serif";

  ctx.fillText(
    label,
    x + 10,
    y
  );
}

function getMid(a,b){

  return{

    x:(a.x+b.x)/2,
    y:(a.y+b.y)/2,
    z:(a.z+b.z)/2
  };
}

function radToDeg(rad){
  return rad * 180 / Math.PI;
}

function normalizeAngle(angle){

  angle %= 360;

  if(angle < 0){
    angle += 360;
  }

  return angle;
}

function lerp(a,b,t){
  return a + (b-a)*t;
}

/* =========================
   ブレ軽減用
========================= */

const smoothPoints = {};
let smoothRotation = 0;
let smoothTilt = 0;

function smoothPoint(name,newPoint){

  if(!smoothPoints[name]){

    smoothPoints[name] = {
      x:newPoint.x,
      y:newPoint.y,
      z:newPoint.z
    };
  }

  smoothPoints[name].x =
  lerp(
    smoothPoints[name].x,
    newPoint.x,
    0.35
  );

  smoothPoints[name].y =
  lerp(
    smoothPoints[name].y,
    newPoint.y,
    0.35
  );

  smoothPoints[name].z =
  lerp(
    smoothPoints[name].z,
    newPoint.z,
    0.35
  );

  return smoothPoints[name];
}

/* =========================
   向き検知
========================= */

function getBodyRotation(
  leftShoulder,
  rightShoulder
){

  const dx =
  rightShoulder.x
  - leftShoulder.x;

  const width =
  Math.abs(dx);

  const MAX_WIDTH = 300;

  let ratio =
  width / MAX_WIDTH;

  ratio =
  Math.max(
    0,
    Math.min(1,ratio)
  );

  let angle =
  Math.acos(ratio);

  angle =
  radToDeg(angle);

  if(dx < 0){
    angle = 360 - angle;
  }

  return normalizeAngle(angle);
}

/* =========================
   顔傾き
========================= */

function getFaceTilt(
  leftShoulder,
  rightShoulder
){

  const dx =
  rightShoulder.x
  - leftShoulder.x;

  const dy =
  rightShoulder.y
  - leftShoulder.y;

  return normalizeAngle(
    radToDeg(
      Math.atan2(dy,dx)
    )
  );
}

video.addEventListener(
"loadeddata",
()=>{
  requestAnimationFrame(loop);
}
);

function loop(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  const results =
  poseLandmarker.detectForVideo(
    video,
    performance.now()
  );

  if(results.landmarks.length > 0){

    const lm =
    results.landmarks[0];

    function getPoint(index){

      return{

        x:
        (1-lm[index].x)
        * canvas.width,

        y:
        lm[index].y
        * canvas.height,

        z:
        lm[index].z
      };
    }

    const face =
    smoothPoint(
      "face",
      getPoint(LANDMARKS.face)
    );

    const leftShoulder =
    smoothPoint(
      "leftShoulder",
      getPoint(LANDMARKS.leftShoulder)
    );

    const rightShoulder =
    smoothPoint(
      "rightShoulder",
      getPoint(LANDMARKS.rightShoulder)
    );

    const leftElbow =
    smoothPoint(
      "leftElbow",
      getPoint(LANDMARKS.leftElbow)
    );

    const rightElbow =
    smoothPoint(
      "rightElbow",
      getPoint(LANDMARKS.rightElbow)
    );

    const leftHand =
    smoothPoint(
      "leftHand",
      getPoint(LANDMARKS.leftHand)
    );

    const rightHand =
    smoothPoint(
      "rightHand",
      getPoint(LANDMARKS.rightHand)
    );

    const leftHip =
    smoothPoint(
      "leftHip",
      getPoint(LANDMARKS.leftHip)
    );

    const rightHip =
    smoothPoint(
      "rightHip",
      getPoint(LANDMARKS.rightHip)
    );

    const leftKnee =
    smoothPoint(
      "leftKnee",
      getPoint(LANDMARKS.leftKnee)
    );

    const rightKnee =
    smoothPoint(
      "rightKnee",
      getPoint(LANDMARKS.rightKnee)
    );

    const leftAnkle =
    smoothPoint(
      "leftAnkle",
      getPoint(LANDMARKS.leftAnkle)
    );

    const rightAnkle =
    smoothPoint(
      "rightAnkle",
      getPoint(LANDMARKS.rightAnkle)
    );

    const leftFoot =
    smoothPoint(
      "leftFoot",
      getPoint(LANDMARKS.leftFoot)
    );

    const rightFoot =
    smoothPoint(
      "rightFoot",
      getPoint(LANDMARKS.rightFoot)
    );

    /* =========================
       追加ポイント
    ========================= */

    const heart =
    getMid(
      leftShoulder,
      rightShoulder
    );

    const waist =
    getMid(
      leftHip,
      rightHip
    );

    const belly = {

      x:(heart.x + waist.x)/2,
      y:(heart.y + waist.y)/2,
      z:(heart.z + waist.z)/2
    };

    /* =========================
       向き
    ========================= */

    let bodyRotation =
    getBodyRotation(
      leftShoulder,
      rightShoulder
    );

    smoothRotation =
    lerp(
      smoothRotation,
      bodyRotation,
      0.15
    );

    bodyRotation =
    smoothRotation;

    /* =========================
       顔傾き
    ========================= */

    let faceTilt =
    getFaceTilt(
      leftShoulder,
      rightShoulder
    );

    smoothTilt =
    lerp(
      smoothTilt,
      faceTilt,
      0.15
    );

    faceTilt =
    smoothTilt;

    const points = [

      [face,"顔","red"],

      [rightShoulder,"右肩","orange"],
      [rightElbow,"右肘","orange"],
      [rightHand,"右手","orange"],

      [leftShoulder,"左肩","cyan"],
      [leftElbow,"左肘","cyan"],
      [leftHand,"左手","cyan"],

      [heart,"心臓","pink"],
      [belly,"へそ","white"],
      [waist,"腰","yellow"],

      [rightHip,"右足付け根","lime"],
      [rightKnee,"右膝","lime"],
      [rightAnkle,"右足首","lime"],
      [rightFoot,"右足先","lime"],

      [leftHip,"左足付け根","magenta"],
      [leftKnee,"左膝","magenta"],
      [leftAnkle,"左足首","magenta"],
      [leftFoot,"左足先","magenta"]
    ];

    for(const p of points){

      drawPoint(
        p[0].x,
        p[0].y,
        p[2],
        p[1]
      );
    }

    let html = "";

    for(const p of points){

      html +=
      "<div>"
      + p[1]
      + " : "
      + "X="
      + Math.round(p[0].x)
      + " "
      + "Y="
      + Math.round(p[0].y)
      + " "
      + "Z="
      + p[0].z.toFixed(2)
      + "</div>";
    }

    html += "<hr>";

    html +=
    "顔の傾き: "
    + faceTilt.toFixed(1)
    + "°<br>";

    html +=
    "体の向き: "
    + bodyRotation.toFixed(1)
    + "°<br>";

    if(
      bodyRotation < 45 ||
      bodyRotation > 315
    ){

      html += "向き: 前";

    }else if(

      bodyRotation >=45 &&
      bodyRotation <135

    ){

      html += "向き: 右";

    }else if(

      bodyRotation >=135 &&
      bodyRotation <225

    ){

      html += "向き: 後ろ";

    }else{

      html += "向き: 左";
    }

    info.innerHTML = html;
  }

  requestAnimationFrame(loop);
}

window.addEventListener(
"resize",
()=>{

  canvas.width =
  window.innerWidth;

  canvas.height =
  window.innerHeight;
}
);

</script>

</body>
</html>
